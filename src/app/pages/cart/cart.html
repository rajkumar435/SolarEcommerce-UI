


<div class="container mt-5">

  <h2 class="mb-4">
    Shopping Cart
  </h2>

  <table class="table table-bordered">

    <thead>

      <tr>
        <th>Product</th>
        <th>Price</th>
        <th>Qty</th>
        <th>Total</th>
        <th></th>
      </tr>

    </thead>

    <tbody>

      <tr
       *ngFor="
       let item of cartService.getItems()">

        <td>
          {{item.name}}
        </td>

        <td>
          ₹ {{item.price}}
        </td>

        <td>

          <button
           class="btn btn-sm btn-danger me-2"
           (click)="decrease(item.id)">

           -

          </button>

          {{item.quantity}}

          <button
           class="btn btn-sm btn-success ms-2"
           (click)="increase(item.id)">

           +

          </button>

        </td>

        <td>

          ₹
          {{item.price * item.quantity}}

        </td>

        <td>

          <button
           class="btn btn-danger"
           (click)="remove(item.id)">

           Remove

          </button>

        </td>

      </tr>

    </tbody>

  </table>

  <div class="text-end">

    <h3>

      Grand Total :

      ₹ {{cartService.getTotal()}}

    </h3>

    <a
     routerLink="/checkout"
     class="btn btn-success">

     Checkout

    </a>

  </div>

</div>
