<div
  class="container py-5"
  *ngIf="product">

  <div class="row">

    <div class="col-md-6">

      <img
        [src]="product.imagePath"
        class="img-fluid rounded shadow">

    </div>

    <div class="col-md-6">

      <h2>
        {{product.name}}
      </h2>

      <p>
        {{product.description}}
      </p>

      <h3 class="text-success">

        ₹ {{product.price}}

      </h3>

      <p>

        Stock :
        {{product.stock}}

      </p>

     <button
  class="btn btn-primary btn-lg"
  (click)="addToCart()">

  Add To Cart

</button>

    </div>

  </div>

</div>
